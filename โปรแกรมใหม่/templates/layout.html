<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CCTV Prep System</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-brand">CCTV PREP</div>
        <nav>
            <a href="/" class="nav-link {{ 'active' if request.path == '/' }}">Dashboard</a>
            <a href="/work-orders" class="nav-link {{ 'active' if request.path == '/work-orders' }}">ใบงาน (Work Orders)</a>
            <a href="/inventory" class="nav-link {{ 'active' if request.path == '/inventory' }}">คลังสินค้า (Inventory)</a>
            <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.05); margin: 0.5rem 0;">
            <a href="/smart_search" class="nav-link {{ 'active' if request.path == '/smart_search' }}">🔍 ค้นหาสาย & จัดการข้อมูล</a>
        </nav>
    </aside>
    
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
